
name: Generate Trophies

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate GitHub Profile Trophy
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: Nassim-FH
          filename: profile-trophy.svg

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "update trophies" || exit 0
          git push
